<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пятнашки</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f0f2f5;
}
.game {
  background: #fff;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  text-align: center;
}
h1 {
  font-size: 24px;
  margin-bottom: 8px;
  color: #1a1a2e;
}
.moves {
  font-size: 14px;
  color: #666;
  margin-bottom: 16px;
}
.board {
  display: grid;
  grid-template-columns: repeat(4, 80px);
  grid-template-rows: repeat(4, 80px);
  gap: 6px;
  background: #1a1a2e;
  padding: 6px;
  border-radius: 12px;
  margin: 0 auto 16px;
}
.tile {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 700;
  background: #e94560;
  color: #fff;
  border-radius: 8px;
  cursor: pointer;
  user-select: none;
  transition: transform 0.15s ease;
}
.tile:active {
  transform: scale(0.95);
}
.tile.empty {
  background: transparent;
  cursor: default;
  pointer-events: none;
}
.btn {
  background: #1a1a2e;
  color: #fff;
  border: none;
  padding: 10px 28px;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: #16213e; }
.btn.solve { background: #2d6a4f; }
.btn.solve:hover { background: #1b4332; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.status {
  font-size: 13px;
  color: #888;
  margin-top: 10px;
  min-height: 20px;
}
.win-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
  z-index: 10;
}
.win-overlay.show { display: flex; }
.win-box {
  background: #fff;
  padding: 40px 50px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 16px 48px rgba(0,0,0,0.2);
}
.win-box h2 { font-size: 28px; margin-bottom: 8px; color: #1a1a2e; }
.win-box p { color: #666; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="game">
  <h1>Пятнашки</h1>
  <div class="moves">Ходов: <span id="moves">0</span></div>
  <div class="board" id="board"></div>
  <button class="btn" id="shuffleBtn">Перемешать</button>
  <button class="btn solve" id="solveBtn">Решить</button>
  <div class="status" id="status"></div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <h2>Вы выиграли!</h2>
    <p>Потрачено ходов: <span id="winMoves">0</span></p>
    <button class="btn" id="winBtn">Новая игра</button>
  </div>
</div>

<script>
const SIZE = 4;
const TOTAL = SIZE * SIZE;
let tiles = [];
let moves = 0;
let isWin = false;
let solving = false;
let solvingAborted = false;

const boardEl = document.getElementById('board');
const movesEl = document.getElementById('moves');
const winOverlay = document.getElementById('winOverlay');
const winMovesEl = document.getElementById('winMoves');
const statusEl = document.getElementById('status');
const solveBtn = document.getElementById('solveBtn');

function init() {
  tiles = Array.from({ length: TOTAL }, (_, i) => i);
  moves = 0;
  isWin = false;
  winOverlay.classList.remove('show');
  movesEl.textContent = '0';
  render();
}

function render() {
  boardEl.innerHTML = '';
  tiles.forEach((val, idx) => {
    const div = document.createElement('div');
    div.className = 'tile' + (val === 0 ? ' empty' : '');
    if (val !== 0) div.textContent = val;
    div.dataset.index = idx;
    div.addEventListener('click', () => onTileClick(idx));
    boardEl.appendChild(div);
  });
}

function isAdjacent(a, b) {
  const ax = a % SIZE, ay = Math.floor(a / SIZE);
  const bx = b % SIZE, by = Math.floor(b / SIZE);
  return (Math.abs(ax - bx) + Math.abs(ay - by)) === 1;
}

function onTileClick(idx) {
  if (isWin || solving) return;
  const emptyIdx = tiles.indexOf(0);
  if (!isAdjacent(idx, emptyIdx)) return;
  [tiles[idx], tiles[emptyIdx]] = [tiles[emptyIdx], tiles[idx]];
  moves++;
  movesEl.textContent = moves;
  render();
  checkWin();
}

function checkWin() {
  const won = tiles.every((val, i) => val === (i + 1) % TOTAL);
  if (won) {
    isWin = true;
    winMovesEl.textContent = moves;
    winOverlay.classList.add('show');
  }
}

function countInversions(arr) {
  let inv = 0;
  const filtered = arr.filter(v => v !== 0);
  for (let i = 0; i < filtered.length; i++)
    for (let j = i + 1; j < filtered.length; j++)
      if (filtered[i] > filtered[j]) inv++;
  return inv;
}

function isSolvable(arr) {
  const inv = countInversions(arr);
  const emptyRowFromBottom = SIZE - Math.floor(arr.indexOf(0) / SIZE);
  if (SIZE % 2 === 1) return inv % 2 === 0;
  return (inv + emptyRowFromBottom) % 2 === 0;
}

function shuffle() {
  if (solving) return;
  do {
    for (let i = TOTAL - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
    }
  } while (!isSolvable(tiles));
  moves = 0;
  movesEl.textContent = '0';
  isWin = false;
  winOverlay.classList.remove('show');
  statusEl.textContent = '';
  render();
}

function manhattan(tiles) {
  let dist = 0;
  for (let i = 0; i < TOTAL; i++) {
    const v = tiles[i];
    if (v === 0) continue;
    const gr = Math.floor((v - 1) / SIZE);
    const gc = (v - 1) % SIZE;
    dist += Math.abs(gr - Math.floor(i / SIZE)) + Math.abs(gc - (i % SIZE));
  }
  return dist;
}

function solve() {
  if (solving || isWin) return;
  if (tiles.every((v, i) => v === (i + 1) % TOTAL)) {
    statusEl.textContent = 'Уже решено';
    return;
  }

  solving = true;
  solvingAborted = false;
  solveBtn.disabled = true;
  document.getElementById('shuffleBtn').disabled = true;
  statusEl.textContent = 'Ищу решение...';

  const start = tiles.slice();
  const goal = Array.from({ length: TOTAL }, (_, i) => (i + 1) % TOTAL);
  const goalKey = goal.join(',');
  const MAX_NODES = 500000;

  const gScore = new Map();
  const key = start.join(',');
  gScore.set(key, 0);

  const open = [{ state: start, path: [], f: manhattan(start) }];
  let nodes = 0;

  function aStarStep() {
    if (solvingAborted) { cleanup(); return; }

    for (let batch = 0; batch < 1000 && open.length > 0 && nodes < MAX_NODES; batch++) {
      if (open.length === 0) break;
      open.sort((a, b) => a.f - b.f);
      const { state, path } = open.shift();
      nodes++;

      if (nodes % 5000 === 0) {
        statusEl.textContent = `Ищу решение... (${nodes} узлов, открыто ${open.length})`;
      }

      const sKey = state.join(',');
      const curG = gScore.get(sKey);

      const emptyIdx = state.indexOf(0);

      for (let i = 0; i < TOTAL; i++) {
        if (!isAdjacent(i, emptyIdx)) continue;
        const next = state.slice();
        next[emptyIdx] = next[i];
        next[i] = 0;
        const k = next.join(',');

        if (k === goalKey) {
          const finalPath = path.concat(i);
          statusEl.textContent = `Решение найдено (${finalPath.length} ходов)`;
          animateSolution(finalPath);
          return;
        }

        const newG = curG + 1;
        if (gScore.has(k) && gScore.get(k) <= newG) continue;
        gScore.set(k, newG);

        open.push({ state: next, path: path.concat(i), f: newG + manhattan(next) });
      }
    }

    if (open.length === 0 || nodes >= MAX_NODES) {
      statusEl.textContent = 'Не удалось найти решение';
      cleanup();
      return;
    }

    setTimeout(aStarStep, 0);
  }

  aStarStep();
}

function animateSolution(path) {
  let i = 0;
  function step() {
    if (solvingAborted) { cleanup(); return; }
    if (i >= path.length) {
      statusEl.textContent = 'Решено!';
      cleanup();
      return;
    }
    const idx = path[i];
    const emptyIdx = tiles.indexOf(0);
    [tiles[idx], tiles[emptyIdx]] = [tiles[emptyIdx], tiles[idx]];
    moves++;
    movesEl.textContent = moves;
    render();
    checkWin();
    i++;
    setTimeout(step, 300);
  }
  step();
}

function cleanup() {
  solving = false;
  solvingAborted = false;
  solveBtn.disabled = false;
  document.getElementById('shuffleBtn').disabled = false;
  if (!statusEl.textContent) statusEl.textContent = '';
}

document.getElementById('shuffleBtn').addEventListener('click', shuffle);
document.getElementById('winBtn').addEventListener('click', shuffle);
solveBtn.addEventListener('click', solve);

init();
</script>
</body>
</html>
